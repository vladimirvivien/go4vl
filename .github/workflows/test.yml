# .github/workflows/test.yml
name: Tests

on: [push]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic

    - name: Build
      run: go build ./...

    - name: Run Unit Tests
      run: go test -v ./v4l2 ./device ./imgsupport

  integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic

    - name: Install kernel headers and modules
      run: |
        sudo apt-get install -y linux-headers-$(uname -r) linux-modules-extra-$(uname -r)

    - name: Build and load v4l2loopback
      run: |
        # Load the V4L2 subsystem (included in linux-modules-extra for Azure kernel)
        sudo modprobe videodev

        # Clone and build v4l2loopback from source
        git clone https://github.com/umlaeute/v4l2loopback.git /tmp/v4l2loopback
        cd /tmp/v4l2loopback
        make KERNEL_DIR=/lib/modules/$(uname -r)/build

        # Load directly from the build directory
        sudo insmod /tmp/v4l2loopback/v4l2loopback.ko devices=2 video_nr=10,11 card_label="go4vl_test_1,go4vl_test_2" exclusive_caps=0

        # Allow non-root access to loopback devices
        sudo chmod 666 /dev/video10 /dev/video11

        # Verify it loaded
        echo "=== Loaded modules ==="
        lsmod | grep v4l2loopback

        echo "=== Video devices ==="
        ls -la /dev/video*

    - name: Run Integration Tests
      run: |
        go test -v -tags=integration ./test/... -args -use-device-emulation=/dev/video10,/dev/video11
