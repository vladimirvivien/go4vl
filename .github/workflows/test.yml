# .github/workflows/test.yml
name: Tests

on: [push]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic

    - name: Build
      run: go build ./...

    - name: Run Unit Tests
      run: go test -v ./v4l2 ./device ./imgsupport

  integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic v4l-utils ffmpeg

    - name: Install kernel headers
      run: |
        sudo apt-get install -y linux-headers-$(uname -r)

    - name: Build and load v4l2loopback
      run: |
        # Clone and build v4l2loopback from source
        git clone https://github.com/umlaeute/v4l2loopback.git /tmp/v4l2loopback
        cd /tmp/v4l2loopback
        make
        sudo make install
        sudo depmod -a

        # Load the module
        sudo modprobe v4l2loopback devices=2 video_nr=10,11 card_label="Test1,Test2" exclusive_caps=0

        # Verify it loaded
        echo "=== Loaded modules ==="
        lsmod | grep v4l2loopback

        echo "=== Video devices ==="
        ls -la /dev/video*

        echo "=== Device info ==="
        v4l2-ctl --list-devices

    - name: Start test patterns
      run: |
        # Start ffmpeg test patterns on the loopback devices
        ffmpeg -f lavfi -i testsrc=size=640x480:rate=30 -pix_fmt yuyv422 -f v4l2 /dev/video10 &
        ffmpeg -f lavfi -i smptebars=size=640x480:rate=30 -pix_fmt yuyv422 -f v4l2 /dev/video11 &
        sleep 2
        echo "Test patterns started"

    - name: Run Integration Tests
      run: |
        go test -v -tags=integration ./test/...
